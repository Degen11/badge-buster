<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Shield / broom sweep shape -->
  <path d="M64 22 C64 22, 96 32, 96 58 C96 84, 64 106, 64 106 C64 106, 32 84, 32 58 C32 32, 64 22, 64 22Z" fill="url(#shield)" opacity="0.9" filter="url(#glow)"/>
  <!-- Inner shield highlight -->
  <path d="M64 30 C64 30, 88 38, 88 58 C88 78, 64 96, 64 96 C64 96, 40 78, 40 58 C40 38, 64 30, 64 30Z" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Sparkle / clear star -->
  <g transform="translate(64, 60)" fill="white">
    <rect x="-2" y="-14" width="4" height="28" rx="2"/>
    <rect x="-14" y="-2" width="28" height="4" rx="2"/>
    <rect x="-9" y="-9" width="3.5" height="18" rx="1.75" transform="rotate(45)"/>
    <rect x="-9" y="-9" width="3.5" height="18" rx="1.75" transform="rotate(-45)"/>
  </g>
  <!-- Small red badge with X in top-right -->
  <circle cx="94" cy="30" r="16" fill="url(#red)" filter="url(#glow)"/>
  <line x1="87" y1="23" x2="101" y2="37" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="101" y1="23" x2="87" y2="37" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
</svg>
