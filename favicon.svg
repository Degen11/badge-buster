<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- App icon shape -->
  <rect x="6" y="8" width="16" height="16" rx="4" fill="url(#accent)" opacity="0.85"/>
  <!-- Red badge circle -->
  <circle cx="23" cy="8" r="6" fill="#ff3b30"/>
  <!-- Slash through badge -->
  <line x1="19" y1="12" x2="27" y2="4" stroke="#0f172a" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="19" y1="12" x2="27" y2="4" stroke="#fbbf24" stroke-width="1.4" stroke-linecap="round"/>
</svg>
